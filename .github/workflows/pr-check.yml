name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oia-site/package-lock.json

      - name: Install dependencies
        run: cd oia-site && npm ci

      - name: Lint
        run: cd oia-site && npm run lint

      - name: Typecheck
        run: cd oia-site && npm run typecheck

      - name: Run tests
        run: cd oia-site && npm test

      - name: Prompt compliance check
        run: |
          failed=0
          for f in prompts/development/*.md prompts/diagrams/*.md; do
            for section in "## Context" "## Goal" "## Constraints" "## Acceptance criteria"; do
              if ! grep -q "$section" "$f"; then
                echo "MISSING '$section' in $f"
                failed=1
              fi
            done
          done
          exit $failed

      - name: ODR compliance check
        run: |
          failed=0
          for f in decisions/org/*.md; do
            # Skip the template and README files
            basename=$(basename "$f")
            if [[ "$basename" == "odr-template.md" || "$basename" == "README.md" ]]; then
              continue
            fi
            # Check required sections
            for section in "## Context" "## Consequences" "## Alternatives" "## Related decisions"; do
              if ! grep -q "$section" "$f"; then
                echo "MISSING section '$section' in $f"
                failed=1
              fi
            done
            # Check required header fields
            for field in "\*\*Decision:\*\*" "\*\*Status:\*\*" "\*\*Level:\*\* Org" "\*\*Binding for:\*\*" "\*\*Derives from:\*\*" "\*\*Implements:\*\*"; do
              if ! grep -qE "$field" "$f"; then
                echo "MISSING field '$field' in $f"
                failed=1
              fi
            done
          done
          exit $failed

      - name: ADR governed-by check
        run: |
          failed=0
          for f in decisions/arch/*.md; do
            basename=$(basename "$f")
            if [[ "$basename" == "README.md" ]]; then
              continue
            fi
            if ! grep -q "\*\*Governed by:\*\*" "$f"; then
              echo "MISSING 'Governed by:' field in $f"
              failed=1
            fi
          done
          exit $failed
